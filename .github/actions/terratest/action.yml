name: "Terratest"
description: "Runs Terratest for a specified path."
inputs:
  tf_version:
    description: "TF version used."
    required: true
  path:
    description: "Path to Terraform module."
    required: true
  terratest_action:
    description: The action (name of a test in Terratest) that will be passed to the Makefile's ACTION parameter
    type: string
    required: true
  pr-id:
    description: A PR number. Optional value, you might want to use it to prefix resources created for a particular PR to identify them easily.
    type: string
    default: ""
    required: false

runs:
  using: "composite"
  steps:
    - name: setup Terraform
      uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 #v2
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false

    - name: setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    # AWS auth via OIDC role assumption. The caller's _tf_test.yml exports
    # ASSUME_ROLE (the IAM role ARN to assume) and AWS_REGION (a repo variable).
    # No long-lived AWS keys are stored in the repo; GitHub's OIDC token is
    # exchanged for short-lived credentials scoped to ASSUME_ROLE.
    - name: configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
      with:
        role-to-assume: ${{ env.ASSUME_ROLE }}
        role-session-name: gh-action-zpa-app-connector
        aws-region: ${{ env.AWS_REGION }}

    - name: ${{ inputs.terratest_action }} infrastructure
      env:
        TPATH:  ${{ inputs.path }}
        ACTION: ${{ inputs.terratest_action }}
        PRID:   ${{ inputs.pr-id }}
        # Surface PRID to Terraform as TF_VAR_pr_id so test fixtures can name
        # resources `p<PR_ID>-...` (PR runs) or `tt-...` (release / scheduled
        # runs). testskeleton.GenerateTerraformVarsInfo("aws") reads PRID and
        # builds the name_prefix accordingly, so orphaned resources from a
        # failed run can be identified and cleaned up by PR number.
        TF_VAR_pr_id: ${{ inputs.pr-id }}
        # Region is also surfaced to Terraform so example fixtures deploy in
        # the same region the AWS provider authenticated against.
        TF_VAR_aws_region: ${{ env.AWS_REGION }}
      shell: bash
      run: make $TPATH ACTION=$ACTION
